site_name: info
site_url: https://jaechow.github.io/info/
site_description: Curated CLI command reference for developers
site_author: Jason Chow
repo_url: https://github.com/jaechow/info
repo_name: jaechow/info

theme:
  name: material
  icon:
    logo: material/console-line
  favicon: assets/images/favicon.png

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select

nav:
  - Home: index.md
  - CLI Power Tools: cli-tools.md
  - Git: git.md
  - Docker: docker.md
  - AI CLI Tools: ai-tools.md
  - Shell & Productivity: shell.md
  - Networking & Security: networking.md
  - Cloud CLI: cloud.md
  - macOS Power User: macos.md
  - Package Managers: package-managers.md
  - Node.js & JS Toolchain: node.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jaechow
      name: jaechow on GitHub

copyright: Copyright &copy; 2026 Jason Chow
